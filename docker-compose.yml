services:
  app:
    # REPLACE <REPO_OWNER> with the GitHub username of the person who owns the repository
    image: ghcr.io/studiocpxp2000/queue-management:main
    container_name: queue-management-app
    restart: always
    networks:
      - proxy
    environment:
      - PORT=3012
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      # Bind mount the local SQLite file so it is not treated as a directory by Docker
      - ./backend/database.sqlite:/usr/src/app/backend/database.sqlite
    labels:
      - "traefik.enable=true"
      # HTTP -> HTTPS Redirect
      - "traefik.http.routers.queuemanagement.rule=Host(`queuemanagement.2209.in`)"
      - "traefik.http.routers.queuemanagement.entrypoints=web"
      - "traefik.http.routers.queuemanagement.middlewares=queuemanagement-redirect"
      - "traefik.http.middlewares.queuemanagement-redirect.redirectscheme.scheme=https"
      # HTTPS Configuration
      - "traefik.http.routers.queuemanagement-secure.rule=Host(`queuemanagement.2209.in`)"
      - "traefik.http.routers.queuemanagement-secure.entrypoints=websecure"
      - "traefik.http.routers.queuemanagement-secure.tls=true"
      - "traefik.http.routers.queuemanagement-secure.tls.certresolver=letsencrypt"
      # Internal Docker Port mapping to Traefik
      - "traefik.http.services.queuemanagement.loadbalancer.server.port=3012"

networks:
  proxy:
    external: true
